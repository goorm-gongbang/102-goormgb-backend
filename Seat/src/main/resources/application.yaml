server:
  port: 8082
  servlet:
    context-path: /seat

spring:
  application:
    name: seat
  jackson:
    time-zone: UTC
    data-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        jdbc:
          time-zone: UTC

  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}

queue:
  preference-key-prefix: seat:preference

springdoc:
  swagger-ui:
    urls:
      - name: Auth-Guard
        url: http://localhost:8080/auth/v3/api-docs
      - name: Queue
        url: http://localhost:8081/queue/v3/api-docs
      - name: Seat
        url: http://localhost:8082/seat/v3/api-docs
      - name: Order-Core
        url: http://localhost:8083/order/v3/api-docs
      - name: Recommendation
        url: http://localhost:8084/recommendation/v3/api-docs

management:
  endpoint:
    health:
      probes:
        enabled: true
      group:
        readiness:
          include: readinessState, db
  endpoints:
    web:
      exposure:
        include: health
