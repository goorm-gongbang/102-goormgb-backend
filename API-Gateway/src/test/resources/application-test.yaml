spring:
  cloud:
    gateway:
      server:
        webflux:
          globalcors:
            corsConfigurations:
              '[/**]':
                allowedOriginPatterns:
                  - "http://localhost"
                allowedMethods: [ GET, POST, PUT, DELETE, OPTIONS ]
                allowedHeaders: [ "*" ]
                allowCredentials: true
          routes:
            - id: auth-guard
              uri: http://localhost
              predicates:
                - Path=/auth/**
            - id: queue
              uri: http://localhost
              predicates:
                - Path=/queue/**
            - id: seat
              uri: http://localhost
              predicates:
                - Path=/seat/**
            - id: order-core
              uri: http://localhost
              predicates:
                - Path=/order/**
            - id: recommendation
              uri: http://localhost
              predicates:
                - Path=/recommendation/**
  data:
    redis:
      host: localhost
      port: 6379

jwt:
  # 테스트용 RSA 공개키 (테스트 전용)
  public-key: 
  issuer: test-issuer
  access-token:
    audience: test-audience